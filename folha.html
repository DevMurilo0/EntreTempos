<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entre Tempos</title>

  <link rel="stylesheet" href="css/folha.css">
</head>
<body>

<div class="scene">

  <!-- LUA -->
  <div class="moon">
    <img src="img/lua.png" alt="Lua">
  </div>

  <!-- LIVROS -->
  <div class="books">
    <img src="img/livros.png" alt="Pilha de livros">
  </div>

  <!-- BILHETE -->
  <div class="note">
    <img src="img/bilhete.png" alt="Bilhete">
  </div>

</div>

<script>
  const categories = [
    { label: "Poemas",       href: "/topicos/poemas/poemas.html",      cls: "fp--1", rotate: -16 },
    { label: "Filmes",       href: "/topicos/filmes/filmes.html",      cls: "fp--2", rotate:   5 },
    { label: "Livros",       href: "/topicos/livros/livros.html",      cls: "fp--3", rotate:  -7 },
    { label: "Desenhos",     href: "/topicos/desenhos/desenhos.html",    cls: "fp--4", rotate:  10 },
    { label: "Música",       href: "/topicos/musica/musica.html",      cls: "fp--5", rotate: -10 },
    { label: "Curiosidades", href: "/topicos/curiosidades/curiosidades.html",cls: "fp--6", rotate:   7 },
  ];

  const scene = document.querySelector('.scene');

  categories.forEach(cat => {
    const wrap = document.createElement('div');
    wrap.className = `footprint-group ${cat.cls}`;
    wrap.style.transform = `rotate(${cat.rotate}deg)`;

    const feet = document.createElement('div');
    feet.className = 'feet';
    feet.innerHTML = `<img src="img/pegadas.png" alt="pegadas">`;



    wrap.appendChild(feet);

    scene.appendChild(wrap);
  });
</script>

</body>
</html>
