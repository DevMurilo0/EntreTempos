<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entre Tempos</title>
  <link rel="stylesheet" href="css/folha.css">
</head>
<body>

<div class="scene">
<!-- LUA -->
  <div class="moon">
    <img src="img/lua.png" alt="Lua">
  </div>
<!-- LIVROS -->
  <div class="books">
    <img src="img/livros.png" alt="Pilha de livros">
  </div>
<!-- BILHETE -->
  <div class="note">
    <img src="img/bilhete.png" alt="Bilhete">
  </div>

</div>

<!-- POLAROIDS -->
<div class="polaroid polaroid--1" data-rotate="-8">
  <img src="img/polaroid1.png" alt="Polaroid 1">
</div>
<div class="polaroid polaroid--2" data-rotate="6">
  <img src="img/polaroid2.png" alt="Polaroid 2">
</div>
<div class="polaroid polaroid--3" data-rotate="-4">
  <img src="img/polaroid3.png" alt="Polaroid 3">
</div>
<div class="polaroid polaroid--4" data-rotate="-2">
  <img src="img/polaroid4.png" alt="Polaroid 4">
</div>


<script>
const categories = [
    { label: "",       href: "/topicos/poemas/poemas.html",            cls: "fp--1", rotate: 160, tagImg: "Etiqueta-poemas.png" },
    { label: "",       href: "/topicos/filmes/filmes.html",            cls: "fp--2", rotate: 199, tagImg: "Etiqueta-filmes.png" },
    { label: "",       href: "/topicos/livros/livros.html",            cls: "fp--3", rotate: 111, tagImg: "Etiqueta-livros.png" },
    { label: "",       href: "/topicos/desenhos/desenhos.html",        cls: "fp--4", rotate: 223, tagImg: "Etiqueta-desenhos.png" },
    { label: "",       href: "/topicos/musica/musica.html",            cls: "fp--5", rotate: 55,  tagImg: "Etiqueta-musica.png" },
    { label: "",       href: "/topicos/curiosidades/curiosidades.html",cls: "fp--6", rotate: 30,  tagImg: "Etiqueta-curiosidades.png" },
];

const scene = document.querySelector('.scene');

categories.forEach(cat => {
  // pé (gira)
  const wrap = document.createElement('div');
  wrap.className = `footprint-group ${cat.cls}`;
  wrap.style.transform = `rotate(${cat.rotate}deg)`;

  const feet = document.createElement('div');
  feet.className = 'feet';
  feet.innerHTML = `<img src="img/pegadas.png" alt="pegadas">`;
  wrap.appendChild(feet);

  // etiqueta (não gira, fica em cima do pé, na mesma posição .fp--N)
  const tagWrap = document.createElement('a');
  tagWrap.href = cat.href;
  tagWrap.className = `tag-group ${cat.cls}`;
  tagWrap.setAttribute('aria-label', cat.label);
  tagWrap.innerHTML = `
    <div class="tag-img-wrap">
      <img src="img/${cat.tagImg}" alt="${cat.label}">
      <span class="tag-label">${cat.label}</span>
    </div>
  `;

  scene.appendChild(wrap);
  scene.appendChild(tagWrap);
});
</script>


</body>
</html>
