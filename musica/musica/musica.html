<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Músicas - Entre Tempos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="musica.css">
</head>
<body>

<!-- Notas musicais de fundo -->
<div class="notas-musicais">
  <span class="nota" style="top:10%;left:5%;animation-delay:0s">♪</span>
  <span class="nota" style="top:25%;left:90%;animation-delay:1s">♫</span>
  <span class="nota" style="top:50%;left:15%;animation-delay:2s">♩</span>
  <span class="nota" style="top:70%;left:80%;animation-delay:3s">♬</span>
  <span class="nota" style="top:85%;left:40%;animation-delay:1.5s">♪</span>
  <span class="nota" style="top:40%;left:55%;animation-delay:3.5s">♫</span>
</div>

<header>
  <a href="../../folha.html">← Voltar</a>
</header>

<div class="page-titulo">
  <h1>MÚSICAS</h1>
  <p class="subtitulo">top 10 · entre tempos</p>
</div>
<div class="divisor"></div>

<div class="mural-musica">

  <!-- Imagens decorativas espalhadas -->
  <img src="img/rita_silhueta.png"   alt="Rita Lee"        class="img-deco img-rita-silhueta">
  <img src="img/rita_assinatura.png" alt="Assinatura Rita" class="img-deco img-rita-assinatura">
  <img src="img/gal_logo.png"        alt="GAL"             class="img-deco img-gal">
  <img src="img/monstro_verde.png"   alt="Mascote"         class="img-deco img-monstro">
  <img src="img/mascara_cássia.png"  alt="Cássia Eller"    class="img-deco img-mascara">
  <img src="img/preta_gil_placa.png" alt="Preta Gil"       class="img-deco img-preta-gil">

  <div class="top10-wrapper">

    <!-- LISTA TOP 10 -->
    <div class="top10-lista">

      <!-- Navegação de mês -->
      <div class="nav-mes">
        <button class="seta-mes" id="seta-esq" aria-label="Mês anterior">&#8592;</button>
        <div class="top10-titulo">
          TOP 10
          <span class="mes-label" id="mes-atual">Junho</span>
        </div>
        <button class="seta-mes" id="seta-dir" aria-label="Próximo mês">&#8594;</button>
      </div>

      <!-- Lista gerada pelo JS -->
      <ul class="lista-musicas" id="lista-musicas"></ul>

    </div>

    <!-- COLUNA DIREITA com imagens -->
    <div class="decoracao-direita">
      <img src="img/rita_cd.png"      alt="CD Rita Lee" class="cd-destaque">
      <img src="img/homem_oculos.png" alt="Artista"     class="foto-homem">
    </div>

  </div>
</div>

<div class="rodape-musica">
  <div>entre tempos · revista eletrônica</div>
  <div class="carimbo">MÚSICAS</div>
</div>

<script src="musica.js"></script>
</body>
</html>
