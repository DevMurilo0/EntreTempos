<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artista — Desenhos | Entre Tempos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=IM+Fell+English:ital@0;1&family=Caveat:wght@400;600&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../pessoa.css">
</head>
<body>
<header>
  <a href="../conhecidos.html">← Voltar para Conhecidos</a>
</header>

<section class="pessoa-section">
  <img src="../img/placeholder-retrato.svg" alt="Artista" class="foto-pessoa">
  <div class="pessoa-info">
    <h2 class="pessoa-nome">Nome do Artista</h2>
    <p class="pessoa-cargo">artista</p>
    <p class="pessoa-bio">
      Descrição do artista aqui.
    </p>
    <p class="contador-desenhos">0 desenhos</p>
  </div>
</section>

<div class="divisor"></div>

<!-- GALERIA
     Para adicionar um desenho:
     1. data-img="nome-do-arquivo.png"
     2. Troque <span>desenho em breve</span> por <img src="nome.png" alt="título">
     3. Remova a classe "vazio" do .quadro -->
<section class="galeria">

  <div class="card-desenho" data-titulo="Desenho I" data-img="">
    <div class="quadro vazio">
      <span>desenho em breve</span>
    </div>
    <p class="card-titulo">desenho 1</p>
    <p class="card-num">I</p>
  </div>

  <div class="card-desenho" data-titulo="Desenho II" data-img="">
    <div class="quadro vazio">
      <span>desenho em breve</span>
    </div>
    <p class="card-titulo">desenho 2</p>
    <p class="card-num">II</p>
  </div>

  <div class="card-desenho" data-titulo="Desenho III" data-img="">
    <div class="quadro vazio">
      <span>desenho em breve</span>
    </div>
    <p class="card-titulo">desenho 3</p>
    <p class="card-num">III</p>
  </div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="lightbox-inner">
    <button class="lightbox-fechar" id="lb-fechar" aria-label="Fechar">✕</button>
    <img src="" alt="" id="lb-img">
    <p class="lightbox-legenda" id="lb-legenda"></p>
  </div>
</div>

<div class="rodape-desenhos">
  <div>entre tempos · revista eletrônica</div>
  <div class="carimbo">DESENHOS</div>
</div>

<script>
  const cards    = document.querySelectorAll('.card-desenho');
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lb-img');
  const lbLeg    = document.getElementById('lb-legenda');
  const lbFechar = document.getElementById('lb-fechar');

  cards.forEach(card => {
    card.addEventListener('click', () => {
      const src    = card.dataset.img;
      const titulo = card.dataset.titulo;
      if (!src) return;
      lbImg.src = src;
      lbImg.alt = titulo;
      lbLeg.textContent = titulo;
      lightbox.classList.add('ativo');
      document.body.style.overflow = 'hidden';
    });
  });

  function fecharLb() {
    lightbox.classList.remove('ativo');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  lbFechar.addEventListener('click', fecharLb);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) fecharLb(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharLb(); });
</script>
</body>
</html>
