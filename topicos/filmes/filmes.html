<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>Filmes - Entre Tempos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="filmes.css">
</head>
<body>

<div class="notas-filmicas">
  <span class="nota" style="top:10%;left:5%;animation-delay:0s">🎬</span>
  <span class="nota" style="top:25%;left:90%;animation-delay:1s">🎥</span>
  <span class="nota" style="top:50%;left:15%;animation-delay:2s">🎞</span>
  <span class="nota" style="top:70%;left:80%;animation-delay:3s">🎬</span>
  <span class="nota" style="top:85%;left:40%;animation-delay:1.5s">🎥</span>
  <span class="nota" style="top:40%;left:55%;animation-delay:3.5s">🎞</span>
  <span class="nota" style="top:15%;left:70%;animation-delay:2.5s">🎬</span>
  <span class="nota" style="top:60%;left:30%;animation-delay:0.8s">🎥</span>
</div>

<header>
  <a href="../../folha.html">← Voltar</a>
</header>

<div class="page-titulo">
  <h1>FILMES</h1>
  <p class="subtitulo">top 5 · entre tempos</p>
</div>
<div class="divisor"></div>

<!-- ══ LATERAIS MOBILE ══ -->
<div class="stickers-mobile">
  <div class="lado-esq">
    <!-- Chaplin pulando: destaque no topo -->
    <img src="img/108_Sem_Titulo.png"               alt="Chaplin"   class="img-deco img-chaplin">
    <!-- Relógio quebrado -->
    <img src="img/128_Sem_Titulo.png"               alt="Relógio"   class="img-deco img-relogio">
    <!-- Padrinho -->
    <img src="img/83_Sem_Titulo_20260603141942.png"  alt="Padrinho"  class="img-deco img-godfather">
    <!-- Escalada na corda (ficou no meio-baixo esquerdo) -->
    <img src="img/131_Sem_Titulo.png"               alt="Escalada"  class="img-deco img-escalada">
    <!-- Bond -->
    <img src="img/82_Sem_Titulo_20260603141923.png"  alt="Bond"      class="img-deco img-bond">
  </div>
  <div class="lado-dir">
    <img src="img/77_Sem_Titulo_20260603141647.png"  alt="Câmera"   class="img-deco img-camera">
    <img src="img/78_Sem_Titulo_20260603141739.png"  alt="TV"       class="img-deco img-tv">
    <img src="img/80_Sem_Titulo_20260603141820.png"  alt="Óculos"   class="img-deco img-oculos">
    <img src="img/81_Sem_Titulo_20260603141857.png"  alt="Fight"    class="img-deco img-fight">
  </div>
</div>

<!-- ══ MURAL PRINCIPAL ══ -->
<div class="mural-filmes">

  <!-- DECORAÇÕES DESKTOP -->
  <!-- LADO ESQUERDO -->
  <!-- Chaplin pulando: posição topo-esquerdo, bem visível -->
  <img src="img/108_Sem_Titulo.png"               alt="Chaplin"   class="img-deco img-chaplin   deco-desktop">
  <!-- Relógio: logo abaixo do Chaplin -->
  <img src="img/128_Sem_Titulo.png"               alt="Relógio"   class="img-deco img-relogio   deco-desktop">
  <!-- Padrinho -->
  <img src="img/83_Sem_Titulo_20260603141942.png"  alt="Padrinho"  class="img-deco img-godfather deco-desktop">
  <!-- Escalada na corda: meio-baixo esquerdo -->
  <img src="img/131_Sem_Titulo.png"               alt="Escalada"  class="img-deco img-escalada  deco-desktop">
  <!-- Bond: canto inferior esquerdo -->
  <img src="img/82_Sem_Titulo_20260603141923.png"  alt="Bond"      class="img-deco img-bond      deco-desktop">

  <!-- LADO DIREITO -->
  <img src="img/77_Sem_Titulo_20260603141647.png"  alt="Câmera"   class="img-deco img-camera    deco-desktop">
  <img src="img/78_Sem_Titulo_20260603141739.png"  alt="TV"       class="img-deco img-tv        deco-desktop">
  <img src="img/80_Sem_Titulo_20260603141820.png"  alt="Óculos"   class="img-deco img-oculos    deco-desktop">
  <img src="img/81_Sem_Titulo_20260603141857.png"  alt="Fight"    class="img-deco img-fight     deco-desktop">

  <div class="top5-wrapper">
    <div class="top5-lista">
      <div class="nav-mes">
        <button class="seta-mes" id="seta-esq" aria-label="Mês anterior">&#8592;</button>
        <div class="top5-titulo">
          TOP 5
          <span class="mes-label" id="mes-atual">Junho</span>
        </div>
        <button class="seta-mes" id="seta-dir" aria-label="Próximo mês">&#8594;</button>
      </div>
      <ul class="lista-filmes" id="lista-filmes"></ul>
    </div>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-filme" id="modalFilme">
  <div class="modal-conteudo">
    <button class="modal-fechar" id="btnFechar">✕</button>
    <div class="modal-titulo">
      <h2 id="filmeTitulo"></h2>
      <p id="filmeDiretor"></p>
    </div>
    <div class="modal-descricao">
      <h3>Sobre o Filme</h3>
      <p id="filmeDescricao"></p>
    </div>
  </div>
</div>

<div class="rodape-filmes">
  <div>entre tempos · revista eletrônica</div>
  <div class="carimbo">FILMES</div>
</div>

<script src="filmes.js"></script>
</body>
</html>
